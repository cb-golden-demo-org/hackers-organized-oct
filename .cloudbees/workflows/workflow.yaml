              <testcase name="testClaimDiagnosisCode" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.020"/>
              <testcase name="testClaimProcedureCode" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.018"/>
              <testcase name="testBatchClaimSubmission" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.041"/>
              <testcase name="testClaimSearchByDate" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.019"/>
              <testcase name="testClaimSearchByProvider" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.021"/>
