              <testcase name="testMemberLookupByName" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.025"/>
              <testcase name="testBenefitSummaryMedical" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.020"/>
              <testcase name="testBenefitSummaryDental" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.018"/>
              <testcase name="testBenefitSummaryVision" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.019"/>
              <testcase name="testDeductibleBalance" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.022"/>
              <testcase name="testOOPMaxBalance" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.021"/>
              <testcase name="testCopaySchedule" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.023"/>
              <testcase name="testGroupEnrollment" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.024"/>
              <testcase name="testDependentCoverage" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.019"/>
              <testcase name="testCOBRAEligibility" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.027"/>
              <testcase name="testMedicarePartA" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.020"/>
              <testcase name="testMedicarePartB" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.022"/>
              <testcase name="testMedicaidDualEligible" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.021"/>
              <testcase name="testPlanTypeHMO" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.018"/>
              <testcase name="testPlanTypePPO" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.019"/>
              <testcase name="testPlanTypeEPO" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.020"/>
              <testcase name="testPlanTypeHDHP" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.018"/>
              <testcase name="testHSAEligibility" classname="com.bcbsaz.claims.EligibilityServiceTest" time="0.022"/>
