              <testcase name="testProviderFeeSchedule" classname="com.bcbsaz.claims.ProviderServiceTest" time="0.020"/>
              <testcase name="testProviderDirectory" classname="com.bcbsaz.claims.ProviderServiceTest" time="0.023"/>
              <testcase name="testProviderSearch" classname="com.bcbsaz.claims.ProviderServiceTest" time="0.019"/>
              <testcase name="testProviderPagination" classname="com.bcbsaz.claims.ProviderServiceTest" time="0.018"/>
