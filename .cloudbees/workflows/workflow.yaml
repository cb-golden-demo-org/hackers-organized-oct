            <testsuite name="com.bcbsaz.claims.ProviderServiceTest" tests="21" failures="0" errors="0" skipped="0" time="0.433">
              <testcase name="testProviderLookupByNPI" classname="com.bcbsaz.claims.ProviderServiceTest" time="0.024"/>
