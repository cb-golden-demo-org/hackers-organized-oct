apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: CI Build
on:
  push:
    branches:
      - "**"
  workflow_dispatch:
permissions:
  scm-token-own: read
  id-token: write
jobs:
  build-and-test:
    outputs:
      artifact-id: ${{ steps.register-artifact.outputs.artifact-id }}
      image-tag: ${{ steps.build-info.outputs.image-tag }}
      build-version: ${{ steps.build-info.outputs.build-version }}
      jenkins-build-number: ${{ steps.simulate-jenkins.outputs.build-number }}
    steps:
      - name: Get source code
        uses: cloudbees-io/checkout@v1

      - name: Compute build info
        id: build-info
        uses: docker://alpine:3.20
        run: |
          SHORT_SHA=$(echo "${{ cloudbees.scm.sha }}" | cut -c1-8)
          BUILD_NUMBER=${{ cloudbees.run_number }}
          BUILD_VERSION="1.0.${BUILD_NUMBER}"
          IMAGE_TAG="${BUILD_VERSION}-${SHORT_SHA}"
          IMAGE="index.docker.io/cloudbeesdemo/bcbs-az-claims-api:${IMAGE_TAG}"

          echo "Build version : ${BUILD_VERSION}"
          echo "Image tag     : ${IMAGE_TAG}"
          echo "Full image    : ${IMAGE}"

          printf '%s' "${BUILD_VERSION}" > $CLOUDBEES_OUTPUTS/build-version
          printf '%s' "${IMAGE_TAG}"     > $CLOUDBEES_OUTPUTS/image-tag
          printf '%s' "${IMAGE}"         > $CLOUDBEES_OUTPUTS/image

      - name: Simulate Jenkins CI — snaqvi-unify
        id: simulate-jenkins
        kind: build
        uses: docker://alpine:3.20
        run: |
          BUILD_NUM=${{ cloudbees.run_number }}
          SHORT_SHA=$(echo "${{ cloudbees.scm.sha }}" | cut -c1-8)

          echo "=============================================="
          echo "  CloudBees CI — snaqvi-unify"
          echo "  Job: Core/Pet Clinic Pipeline"
          echo "  Build: #${BUILD_NUM}"
          echo "=============================================="
          echo ""
          echo "[INFO] Checking out source from ${{ cloudbees.scm.repositoryUrl }}"
          echo "[INFO] Commit: ${{ cloudbees.scm.sha }}"
          echo "[INFO] Branch: ${{ cloudbees.scm.branch }}"
          echo ""
          echo "--- Maven Build ---"
          echo "[INFO] Scanning for projects..."
          echo "[INFO] Building bcbs-az-claims-api 1.0.${BUILD_NUM}"
          echo "[INFO] --- maven-compiler-plugin:3.11.0:compile ---"
          echo "[INFO] Compiling 47 source files to target/classes"
          echo "[INFO] --- maven-compiler-plugin:3.11.0:testCompile ---"
          echo "[INFO] Compiling 23 test source files"
          echo "[INFO] --- maven-surefire-plugin:3.1.2:test ---"
          echo "[INFO] Running com.bcbsaz.claims.ClaimsServiceTest"
          echo "[INFO] Tests run: 38, Failures: 0, Errors: 0, Skipped: 0"
          echo "[INFO] Running com.bcbsaz.claims.EligibilityServiceTest"
          echo "[INFO] Tests run: 27, Failures: 0, Errors: 0, Skipped: 0"
          echo "[INFO] Running com.bcbsaz.claims.ProviderServiceTest"
          echo "[INFO] Tests run: 21, Failures: 0, Errors: 0, Skipped: 0"
          echo "[INFO] --- maven-jar-plugin:3.3.0:jar ---"
          echo "[INFO] Building jar: target/bcbs-az-claims-api-1.0.${BUILD_NUM}.jar"
          echo "[INFO] BUILD SUCCESS"
          echo ""
          echo "--- Artifact ---"
          echo "[INFO] bcbs-az-claims-api-1.0.${BUILD_NUM}.jar (18.4 MB)"
          echo "[INFO] SHA-256: $(echo "${BUILD_NUM}${SHORT_SHA}" | sha256sum | cut -c1-64)"
          echo ""
          echo "Finished: SUCCESS"
          echo "Duration: 1 min 47 sec"
          echo "Build URL: https://sda.preview.cb-demos.io/snaqvi-unify/job/Core/job/Pet%20Clinic%20Pipeline/${BUILD_NUM}/"

          printf '%s' "${BUILD_NUM}" > $CLOUDBEES_OUTPUTS/build-number
          printf '%s' "SUCCESS"      > $CLOUDBEES_OUTPUTS/status
          printf '%s' "1 min 47 sec" > $CLOUDBEES_OUTPUTS/duration

      - name: Run unit tests
        id: unit-tests
        kind: test
        uses: docker://alpine:3.20
        run: |
          echo "--- Surefire Test Report ---"
          echo "Tests run: 86, Failures: 0, Errors: 0, Skipped: 0"
          echo ""
          echo "com.bcbsaz.claims.ClaimsServiceTest         38 tests  PASS  0.847s"
          echo "com.bcbsaz.claims.EligibilityServiceTest    27 tests  PASS  0.612s"
          echo "com.bcbsaz.claims.ProviderServiceTest       21 tests  PASS  0.433s"
          echo ""
          echo "Coverage: 84.3% (lines) | 79.1% (branches)"
          echo "BUILD SUCCESS"

          printf '%s' "86"    > $CLOUDBEES_OUTPUTS/tests-run
          printf '%s' "0"     > $CLOUDBEES_OUTPUTS/failures
          printf '%s' "84.3"  > $CLOUDBEES_OUTPUTS/coverage

      - name: Build and push container image
        id: build-image
        kind: build
        uses: docker://alpine:3.20
        run: |
          IMAGE_TAG="${{ steps.build-info.outputs.image-tag }}"
          IMAGE="index.docker.io/cloudbeesdemo/bcbs-az-claims-api:${IMAGE_TAG}"

          echo "--- Kaniko Image Build ---"
          echo "Destination: ${IMAGE}"
          echo ""
          echo "[build] FROM eclipse-temurin:17-jre-alpine"
          echo "[build] COPY target/bcbs-az-claims-api-${{ steps.build-info.outputs.build-version }}.jar app.jar"
          echo "[build] EXPOSE 8080"
          echo "[build] ENTRYPOINT [\"java\",\"-jar\",\"/app.jar\"]"
          echo ""
          echo "Pushing image layers..."
          echo "layer sha256:a1b2c3d4  12.3 MB  pushed"
          echo "layer sha256:e5f6a7b8   8.1 MB  pushed"
          echo "layer sha256:c9d0e1f2  18.4 MB  pushed"
          echo ""
          echo "Image pushed: ${IMAGE}"
          echo "Digest: sha256:9feb7cd58be8d686bcadc365bd14d2ccbc4fada60ad9ab9f8bc6c7b18c6099a4"

          printf '%s' "${IMAGE}" > $CLOUDBEES_OUTPUTS/image-url

      - name: Register artifact
        id: register-artifact
        uses: cloudbees-io/register-artifact@v1
        with:
          name: bcbs-az-claims-api
          version: ${{ steps.build-info.outputs.build-version }}
          url: index.docker.io/cloudbeesdemo/bcbs-az-claims-api:${{ steps.build-info.outputs.image-tag }}
          type: docker

      - name: Publish build evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 🏗️ CI Build — ✅ SUCCESS

            **Component:** `bcbs-az-claims-api` | **Version:** `${{ steps.build-info.outputs.build-version }}` | **Run:** #${{ cloudbees.run_number }}

            ### 🔧 Build Identity
            | Field | Value |
            |-------|-------|
            | Version | ${{ steps.build-info.outputs.build-version }} |
            | Image Tag | ${{ steps.build-info.outputs.image-tag }} |
            | Commit | ${{ cloudbees.scm.sha }} |
            | Branch | ${{ cloudbees.scm.branch }} |
            | Jenkins Build | #${{ steps.simulate-jenkins.outputs.build-number }} |
            | Jenkins Status | ${{ steps.simulate-jenkins.outputs.status }} |
            | Jenkins Duration | ${{ steps.simulate-jenkins.outputs.duration }} |

            ### 🧪 Test Results
            | Suite | Tests | Passed | Failed | Coverage |
            |-------|-------|--------|--------|----------|
            | ClaimsServiceTest | 38 | 38 | 0 | — |
            | EligibilityServiceTest | 27 | 27 | 0 | — |
            | ProviderServiceTest | 21 | 21 | 0 | — |
            | **Total** | **86** | **86** | **0** | **84.3%** |

            ### 📦 Artifact
            | Field | Value |
            |-------|-------|
            | Image | `index.docker.io/cloudbeesdemo/bcbs-az-claims-api:${{ steps.build-info.outputs.image-tag }}` |
            | Digest | `sha256:9feb7cd58be8d686bcadc365bd14d2ccbc4fada60ad9ab9f8bc6c7b18c6099a4` |
            | Size | 38.8 MB |
            | Registry | Docker Hub |
          format: MARKDOWN

  security-scan:
    needs: build-and-test
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: SonarQube SAST
        kind: scan
        uses: cloudbees-io/sonarqube-bundled-sast-scan-code@v1
        continue-on-error: true
        with:
          language: LANGUAGE_JAVA
      - name: Snyk SCA
        kind: scan
        uses: cloudbees-io/snyk-sca-scan-dependency@v1
        continue-on-error: true
        with:
          orgname: ${{ secrets.SNYK_ORGNAME }}
          token: ${{ secrets.SNYK_TOKEN }}
          language: LANGUAGE_JAVA
      - name: Publish security evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## 🛡️ Security Scan — ✅ PASSED

            **Component:** `bcbs-az-claims-api` | **Version:** `${{ needs.build-and-test.outputs.build-version }}`

            ### SonarQube SAST
            | Metric | Value | Threshold | Status |
            |--------|-------|-----------|--------|
            | Critical Issues | 0 | 0 | ✅ Pass |
            | High Issues | 0 | 0 | ✅ Pass |
            | Medium Issues | 2 | ≤ 5 | ✅ Pass |
            | Code Coverage | 84.3% | ≥ 80% | ✅ Pass |
            | Technical Debt | 2h 15m | ≤ 8h | ✅ Pass |

            ### Snyk SCA
            | Severity | Found | Status |
            |----------|-------|--------|
            | Critical | 0 | ✅ Pass |
            | High | 0 | ✅ Pass |
            | Medium | 3 | ✅ Pass |
            | Low | 11 | ✅ Pass |

            **247 dependencies scanned** | 0 license violations
          format: MARKDOWN
