              <testcase name="testClaimCopayCalculation" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.018"/>
              <testcase name="testClaimCoinsuranceCalc" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.019"/>
              <testcase name="testClaimOOPMaxApplied" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.022"/>
              <testcase name="testClaimNetworkValidation" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.021"/>
              <testcase name="testClaimOutOfNetwork" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.024"/>
              <testcase name="testClaimPreAuthRequired" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.020"/>
              <testcase name="testClaimPreAuthApproved" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.023"/>
              <testcase name="testClaimReferralValidation" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.019"/>
              <testcase name="testClaimTimeliness835" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.022"/>
              <testcase name="testClaim837PTransaction" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.026"/>
              <testcase name="testClaimEDI999Ack" classname="com.bcbsaz.claims.ClaimsServiceTest" time="0.018"/>
            </testsuite>
            <testsuite name="com.bcbsaz.claims.EligibilityServiceTest" tests="27" failures="0" errors="0" skipped="0" time="0.612">
