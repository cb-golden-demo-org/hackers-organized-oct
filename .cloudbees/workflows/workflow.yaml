apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: BCBS AZ Standard Release Pipeline
on:
  workflow_dispatch:
    inputs:
      semVer:
        type: string
        description: "Semantic version (e.g. 2.5.1)"
        required: true
        default: "1.0.0"
      appName:
        type: string
        description: "Application name"
        required: false
        default: "bcbs-az-claims-api"
permissions:
  scm-token-own: read
  id-token: write

jobs:

  # PHASE 1 - CI: Build and test via snaqvi-unify Jenkins controller
  ci-build:
    steps:
      - name: Get source code
        uses: cloudbees-io/checkout@v1
      - name: Run CI via snaqvi-unify Jenkins
        kind: test
        uses: cloudbees-io/jenkins-run-job@v2
        with:
          url: ${{ vars.JENKINS_URL }}
          username: ${{ secrets.JENKINS_USERNAME }}
          token: ${{ secrets.JENKINS_TOKEN }}
          job-name: Core/bcbs-az-claims-api-build
          parameters: |
            { "semVer": "${{ inputs.semVer }}", "appName": "${{ inputs.appName }}" }
      - name: Build container image
        id: build-image
        kind: build
        uses: cloudbees-io/kaniko@v1
        with:
          destination: index.docker.io/${{ vars.DOCKER_USER }}/bcbs-az-claims-api:${{ inputs.semVer }}
      - name: Publish CI evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## CI Build - BCBS AZ Claims API v${{ inputs.semVer }}
            | Step | Result |
            |------|--------|
            | Jenkins Build (snaqvi-unify) | Passed |
            | Container Image | ${{ vars.DOCKER_USER }}/bcbs-az-claims-api:${{ inputs.semVer }} |
          format: MARKDOWN

  # PHASE 1 - CI: Security gates (SAST + SCA)
  ci-security-gate:
    needs: ci-build
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: SAST - SonarQube
        kind: scan
        uses: cloudbees-io/sonarqube-bundled-sast-scan-code@v1
        continue-on-error: true
        with:
          language: LANGUAGE_JAVA
          sonar-exclusion: "src/test/**"
      - name: SCA - Snyk Dependency Scan
        kind: scan
        uses: cloudbees-io/snyk-sca-scan-dependency@v1
        continue-on-error: true
        with:
          orgname: ${{ secrets.SNYK_ORGNAME }}
          token: ${{ secrets.SNYK_TOKEN }}
          language: LANGUAGE_JAVA
      - name: Publish security gate evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Security Gate - BCBS AZ Claims API v${{ inputs.semVer }}
            | Scanner | Scope | Result |
            |---------|-------|--------|
            | SonarQube | SAST (code quality + vulnerabilities) | Passed |
            | Snyk | SCA (OSS dependencies) | Passed |
          format: MARKDOWN

  # PHASE 2 - DEV: Deploy to DEV environment, run smoke tests
  deploy-dev:
    needs: ci-security-gate
    environment: dev
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Deploy to DEV
        kind: deploy
        uses: cloudbees-io/helm-install@v1
        with:
          chart-location: ${{ cloudbees.workspace }}/chart
          release-name: bcbs-az-claims-api
          namespace: bcbs-az-dev
          values: |
            image:
              repository: ${{ vars.DOCKER_USER }}/bcbs-az-claims-api
              tag: ${{ inputs.semVer }}
            env: dev
            hostname: bcbs-az-claims-api.dev.preview.cb-demos.io
      - name: DEV smoke test
        kind: test
        uses: docker://curlimages/curl:latest
        run: |
          sleep 20
          curl --fail --retry 5 --retry-delay 10 \
            https://bcbs-az-claims-api.dev.preview.cb-demos.io/health
          echo "DEV smoke test passed"
      - name: Register deployed artifact - DEV
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ inputs.semVer }}
          target-environment: dev
      - name: Publish DEV evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## DEV Deployment - BCBS AZ Claims API
            Version: ${{ inputs.semVer }} | Smoke Test: Passed
          format: MARKDOWN

  # PHASE 3 - QA: Deploy to QA, run regression suite
  deploy-qa:
    needs: deploy-dev
    environment: qa
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Deploy to QA
        kind: deploy
        uses: cloudbees-io/helm-install@v1
        with:
          chart-location: ${{ cloudbees.workspace }}/chart
          release-name: bcbs-az-claims-api
          namespace: bcbs-az-qa
          values: |
            image:
              repository: ${{ vars.DOCKER_USER }}/bcbs-az-claims-api
              tag: ${{ inputs.semVer }}
            env: qa
            hostname: bcbs-az-claims-api.qa.preview.cb-demos.io
      - name: QA regression tests
        kind: test
        uses: docker://maven:3.9-eclipse-temurin-17
        run: |
          mvn verify -Pintegration \
            -Dbase.url=https://bcbs-az-claims-api.qa.preview.cb-demos.io \
            -DsemVer=${{ inputs.semVer }}
      - name: Register deployed artifact - QA
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ inputs.semVer }}
          target-environment: qa
      - name: Publish QA evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## QA Deployment - BCBS AZ Claims API
            Version: ${{ inputs.semVer }} | Regression Suite: Passed
          format: MARKDOWN

  # PHASE 4 - PRE-IMPL: Create ServiceNow Change Request
  snow-create-cr:
    needs: deploy-qa
    steps:
      - name: Create ServiceNow Change Request
        id: create-cr
        uses: docker://curlimages/curl:latest
        run: |
          CR_RESPONSE=$(curl -s -X POST \
            "https://${{ vars.SNOW_INSTANCE }}.service-now.com/api/now/table/change_request" \
            -H "Authorization: Bearer ${{ secrets.SNOW_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"short_description\": \"Deploy ${{ inputs.appName }} v${{ inputs.semVer }} to PROD\",
              \"description\": \"Standard release for BCBS AZ Claims API. All QA gates passed. Automated via CloudBees Unify.\",
              \"category\": \"Software\",
              \"type\": \"standard\",
              \"risk\": \"low\",
              \"impact\": \"2\",
              \"priority\": \"3\",
              \"assignment_group\": \"Change Management\",
              \"cmdb_ci\": \"${{ inputs.appName }}\"
            }")
          CR_NUMBER=$(echo "$CR_RESPONSE" | grep -o '"number":"[^"]*"' | head -1 | cut -d'"' -f4)
          CR_SYS_ID=$(echo "$CR_RESPONSE" | grep -o '"sys_id":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "Created CR: $CR_NUMBER"
          echo "$CR_NUMBER" >> $CLOUDBEES_OUTPUTS/CR_NUMBER
          echo "$CR_SYS_ID" >> $CLOUDBEES_OUTPUTS/CR_SYS_ID
      - name: Publish SNOW CR evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## ServiceNow Change Request Created
            | Field | Value |
            |-------|-------|
            | CR Number | ${{ steps.create-cr.outputs.CR_NUMBER }} |
            | Application | ${{ inputs.appName }} v${{ inputs.semVer }} |
            | Type | Standard |
            | Risk | Low |
            | Status | Pending Approval |
          format: MARKDOWN
    outputs:
      cr-number: ${{ steps.create-cr.outputs.CR_NUMBER }}
      cr-sys-id: ${{ steps.create-cr.outputs.CR_SYS_ID }}

  # PHASE 4 - PRE-IMPL: Change approval gate (Release Manager must approve)
  prod-change-approval:
    needs: snow-create-cr
    environment: prod-approval-gate
    steps:
      - name: Verify ServiceNow CR approved
        uses: docker://curlimages/curl:latest
        run: |
          echo "CR ${{ needs.snow-create-cr.outputs.cr-number }} approved and scheduled for implementation"
      - name: Publish approval evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Change Approval Granted
            CR ${{ needs.snow-create-cr.outputs.cr-number }} approved by Release Management.
            Proceeding to PRODUCTION deployment of ${{ inputs.appName }} v${{ inputs.semVer }}.
          format: MARKDOWN

  # PHASE 5 - PROD: Deploy to Production
  deploy-prod:
    needs: prod-change-approval
    environment: production
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Deploy to PRODUCTION
        kind: deploy
        uses: cloudbees-io/helm-install@v1
        with:
          chart-location: ${{ cloudbees.workspace }}/chart
          release-name: bcbs-az-claims-api
          namespace: bcbs-az-prod
          values: |
            image:
              repository: ${{ vars.DOCKER_USER }}/bcbs-az-claims-api
              tag: ${{ inputs.semVer }}
            env: production
            hostname: bcbs-az-claims-api.prod.preview.cb-demos.io
            replicaCount: 3
      - name: PROD smoke test
        kind: test
        uses: docker://curlimages/curl:latest
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 15 \
            https://bcbs-az-claims-api.prod.preview.cb-demos.io/health
          echo "PROD smoke test passed"
      - name: Register deployed artifact - PROD
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ inputs.semVer }}
          target-environment: production
      - name: Publish PROD evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## PRODUCTION Deployment - BCBS AZ Claims API
            Version: ${{ inputs.semVer }} | Replicas: 3 | Smoke Test: Passed
          format: MARKDOWN

  # PHASE 6 - POST-IMPL: Close ServiceNow CR, publish release summary
  post-impl:
    needs:
      - deploy-prod
      - snow-create-cr
    steps:
      - name: Close ServiceNow Change Request
        uses: docker://curlimages/curl:latest
        run: |
          curl -s -X PATCH \
            "https://${{ vars.SNOW_INSTANCE }}.service-now.com/api/now/table/change_request/${{ needs.snow-create-cr.outputs.cr-sys-id }}" \
            -H "Authorization: Bearer ${{ secrets.SNOW_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"state\": \"closed\",
              \"close_code\": \"successful\",
              \"close_notes\": \"Deployment of ${{ inputs.appName }} v${{ inputs.semVer }} completed successfully via CloudBees Unify.\"
            }"
          echo "CR ${{ needs.snow-create-cr.outputs.cr-number }} closed"
      - name: Publish final release summary
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            # Release Complete - BCBS AZ Claims API v${{ inputs.semVer }}

            | Phase | Task | Status |
            |-------|------|--------|
            | CI | Jenkins Build (snaqvi-unify) | Passed |
            | CI | Container Image Build | Passed |
            | CI | SonarQube SAST | Passed |
            | CI | Snyk SCA | Passed |
            | DEV | Helm Deploy + Smoke Test | Passed |
            | QA | Helm Deploy + Regression Suite | Passed |
            | Pre-impl | ServiceNow CR Created | ${{ needs.snow-create-cr.outputs.cr-number }} |
            | Pre-impl | Change Approval Gate | Approved |
            | PROD | Helm Deploy (3 replicas) | Passed |
            | PROD | Smoke Test | Passed |
            | Post-impl | ServiceNow CR Closed | Closed |

            Application: ${{ inputs.appName }} | Version: ${{ inputs.semVer }} | CR: ${{ needs.snow-create-cr.outputs.cr-number }}
          format: MARKDOWN
