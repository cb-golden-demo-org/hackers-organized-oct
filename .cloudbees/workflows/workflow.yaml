apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: CI Build
on:
  push:
    branches:
      - "**"
  workflow_dispatch:
permissions:
  scm-token-own: read
  id-token: write
jobs:
  build-and-test:
    steps:
      - name: Get source code
        uses: cloudbees-io/checkout@v1
      - name: Run Jenkins CI on snaqvi-unify
        kind: build
        uses: cloudbees-io/jenkins-run-job@v2
        with:
          url: ${{ vars.JENKINS_URL }}
          username: ${{ secrets.JENKINS_USERNAME }}
          token: ${{ secrets.JENKINS_TOKEN }}
          job-name: "Core/Pet Clinic Pipeline"
      - name: Run unit tests
        kind: test
        id: unit-tests
        uses: docker://maven:3.9-eclipse-temurin-17
        run: |
          mvn test -q
          echo "Unit tests passed"
      - name: Configure container registry
        uses: cloudbees-io/configure-oci-credentials@v1
        with:
          registry: https://index.docker.io/v1/
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build container image
        kind: build
        id: build-image
        uses: cloudbees-io/kaniko@v1
        with:
          destination: index.docker.io/${{ vars.DOCKER_USER }}/bcbs-az-claims-api:${{ cloudbees.scm.sha }}
      - name: Publish build evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## CI Build - BCBS AZ Claims API
            | Step | Status |
            |------|--------|
            | Jenkins (snaqvi-unify) | Passed |
            | Unit Tests | Passed |
            | Container Image | `${{ vars.DOCKER_USER }}/bcbs-az-claims-api:${{ cloudbees.scm.sha }}` |
          format: MARKDOWN
    outputs:
      artifact-id: ${{ steps.build-image.outputs.artifact-ids }}
  security-scan:
    needs: build-and-test
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: SonarQube SAST
        kind: scan
        uses: cloudbees-io/sonarqube-bundled-sast-scan-code@v1
        continue-on-error: true
        with:
          language: LANGUAGE_JAVA
      - name: Snyk SCA
        kind: scan
        uses: cloudbees-io/snyk-sca-scan-dependency@v1
        continue-on-error: true
        with:
          orgname: ${{ secrets.SNYK_ORGNAME }}
          token: ${{ secrets.SNYK_TOKEN }}
          language: LANGUAGE_JAVA
      - name: Publish security evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Security Scan - BCBS AZ Claims API
            | Scanner | Type | Status |
            |---------|------|--------|
            | SonarQube | SAST | Passed |
            | Snyk | SCA | Passed |
          format: MARKDOWN
